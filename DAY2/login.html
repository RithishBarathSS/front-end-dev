<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #4caf50;
    }

    .login-container {
      width: 420px;
      background-color: #f2f2f2;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
      text-align: center;
    }

    h1 {
      margin-bottom: 35px;
      font-size: 40px;
      color: black;
    }

    input {
      width: 100%;
      padding: 15px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 18px;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 22px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    .forgot-password {
      display: block;
      margin-top: 20px;
      color: blue;
      text-decoration: none;
      font-size: 20px;
    }

    .signup-text {
      margin-top: 25px;
      font-size: 20px;
    }

    .signup-text a {
      color: blue;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <h1>Login</h1>

    <form>

      <input 
        type="text" 
        placeholder="Enter Username"
        required
      >

      <input 
        type="password" 
        placeholder="Enter Password"
        required
      >

      <button type="submit">
        Login
      </button>

    </form>

    <a href="#" class="forgot-password">
      Forgot Password?
    </a>

    <p class="signup-text">
      Don't have an account?
      <a href="#">Sign Up</a>
    </p>

  </div>

</body>
</html>
