<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(to right, #6a11cb, #ff4b91);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 50px;
      margin-bottom: 20px;
    }

    h2 {
      color: yellow;
      font-size: 38px;
      margin-bottom: 30px;
    }

    .form-container {
      width: 500px;
      background-color: #f2edf2;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0px 0px 10px rgba(0,0,0,0.3);
    }

    label {
      display: block;
      margin-top: 15px;
      margin-bottom: 8px;
      color: #5a00cc;
      font-size: 28px;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #ccc;
      border-radius: 8px;
      font-size: 18px;
    }

    .gender {
      margin-top: 10px;
      font-size: 18px;
    }

    .gender input {
      width: auto;
      margin-right: 5px;
    }

    textarea {
      resize: none;
      height: 100px;
    }

    .buttons {
      margin-top: 25px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background-color: #6a11cb;
      color: white;
      font-size: 20px;
      cursor: pointer;
      margin-right: 10px;
    }

    button:hover {
      background-color: #4d0c99;
    }
  </style>
</head>

<body>

  <h1>Hindusthan Institute of Technology</h1>

  <h2>Student Registration Form</h2>

  <div class="form-container">

    <form>

      <label>Name:</label>
      <input type="text" placeholder="Enter your name">

      <label>Date of Birth:</label>
      <input type="date">

      <label>Email:</label>
      <input type="email" placeholder="Enter your email">

      <label>Password:</label>
      <input type="password" placeholder="Create password">

      <label>Gender:</label>

      <div class="gender">
        <input type="radio" name="gender"> Male

        <input type="radio" name="gender"> Female
      </div>

      <label>City:</label>

      <select>
        <option>Select City</option>
        <option>Chennai</option>
        <option>Coimbatore</option>
        <option>Madurai</option>
        <option>Salem</option>
      </select>

      <label>Remarks:</label>

      <textarea placeholder="Enter your remarks"></textarea>

      <div class="buttons">
        <button type="submit">Register</button>

        <button type="reset">Reset</button>
      </div>

    </form>

  </div>

</body>
</html>
