<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Colorful Calculator</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }

    .calculator {
      background: #ffffff;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 15px;
      color: #2563eb;
      font-weight: bold;
    }

    #display {
      width: 100%;
      height: 60px;
      font-size: 26px;
      margin-bottom: 15px;
      text-align: right;
      border: none;
      border-radius: 10px;
      padding-right: 10px;
      background: #f3f4f6;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 75px);
      gap: 12px;
    }

    button {
      height: 65px;
      font-size: 22px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.05);
    }

    .number {
      background: #3b82f6;
    }

    .number:hover {
      background: #2563eb;
    }

    .operator {
      background: #8b5cf6;
    }

    .operator:hover {
      background: #7c3aed;
    }

    .clear {
      background: #ef4444;
    }

    .clear:hover {
      background: #dc2626;
    }

    .equal {
      background: #f59e0b;
    }

    .equal:hover {
      background: #d97706;
    }
  </style>
</head>

<body>

  <div class="calculator">

    <div class="title">Calculator</div>

    <input type="text" id="display" disabled />

    <div class="buttons">

      <button onclick="clearDisplay()" class="clear">C</button>
      <button onclick="appendValue('/')" class="operator">/</button>
      <button onclick="appendValue('*')" class="operator">*</button>
      <button onclick="appendValue('-')" class="operator">-</button>

      <button onclick="appendValue('7')" class="number">7</button>
      <button onclick="appendValue('8')" class="number">8</button>
      <button onclick="appendValue('9')" class="number">9</button>
      <button onclick="appendValue('+')" class="operator">+</button>

      <button onclick="appendValue('4')" class="number">4</button>
      <button onclick="appendValue('5')" class="number">5</button>
      <button onclick="appendValue('6')" class="number">6</button>
      <button onclick="calculate()" class="equal">=</button>

      <button onclick="appendValue('1')" class="number">1</button>
      <button onclick="appendValue('2')" class="number">2</button>
      <button onclick="appendValue('3')" class="number">3</button>
      <button onclick="appendValue('.')" class="operator">.</button>

      <button onclick="appendValue('0')" class="number">0</button>

    </div>
  </div>

  <script>
    function appendValue(value) {
      document.getElementById("display").value += value;
    }

    function clearDisplay() {
      document.getElementById("display").value = "";
    }

    function calculate() {
      let display = document.getElementById("display");

      try {
        display.value = eval(display.value);
      } catch {
        display.value = "Error";
      }
    }
  </script>

</body>
</html>
